<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Advanced Todo Card</title>
    <link rel="stylesheet" href="stylesheet.css" />
  </head>
  <body>
    <article data-testid="test-todo-card" class="todo-card">
      <!-- HEADER -->
      <div class="todo-header">
        <input type="checkbox" data-testid="test-todo-complete-toggle" />
        <h2 data-testid="test-todo-title">Finish Frontend Task</h2>
      </div>

      <!-- STATUS CONTROL -->
      <select data-testid="test-todo-status-control">
        <option>Pending</option>
        <option selected>In Progress</option>
        <option>Done</option>
      </select>

      <!-- DESCRIPTION -->
      <div data-testid="test-todo-collapsible-section" class="collapsed">
        <p data-testid="test-todo-description" class="description">
          Build a testable todo item card component with semantic HTML, CSS, and
          Javascript.
        </p>
      </div>
      <button data-testid="test-todo-expand-toggle">Expand</button>

      <!-- PRIORITY + STATUS -->
      <div class="todo-info">
        <span data-testid="test-todo-priority" class="priority high">High</span>
        <span
          data-testid="test-todo-priority-indicator"
          class="indicator high"
        ></span>
        <span data-testid="test-todo-status" class="status">In Progress</span>
      </div>

      <!-- DUE DATE -->
      <time data-testid="test-todo-due-date" datetime="2026-04-17T23:59:00">
        Due Apr 17, 2026
      </time>

      <!-- TIME -->
      <p data-testid="test-todo-time-remaining" id="timeRemaining"></p>
      <span data-testid="test-todo-overdue-indicator" class="hidden">
        Overdue
      </span>

      <!-- TAGS (UNCHANGED) -->
      <ul data-testid="test-todo-tags" class="tags">
        <li data-testid="test-todo-tag-frontend">Frontend</li>
        <li data-testid="test-todo-tag-hng">HNG</li>
      </ul>

      <!-- ACTIONS -->
      <div data-testid="test-todo-action-button" class="actions-btn">
        <button data-testid="test-todo-edit-button">Edit</button>
        <button data-testid="test-todo-delete-button">Delete</button>
      </div>

      <!-- EDIT FORM -->
      <form data-testid="test-todo-edit-form" class="hidden">
        <input data-testid="test-todo-edit-title-input" />
        <textarea data-testid="test-todo-edit-description-input"></textarea>

        <select data-testid="test-todo-edit-priority-select">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <input
          type="datetime-local"
          data-testid="test-todo-edit-due-date-input"
        />

        <button type="button" data-testid="test-todo-save-button">Save</button>
        <button type="button" data-testid="test-todo-cancel-button">
          Cancel
        </button>
      </form>
    </article>

    <script src="script.js"></script>
  </body>
</html>
